<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👁 緑内障・生活習慣 記録帳</title>
<!-- React & Babel CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<!-- Recharts CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1923; color: #e4eaf2; font-family: 'Segoe UI', sans-serif; font-size: 14px; }
  input, textarea, button, select { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const {
  LineChart, Line, XAxis, YAxis, CartesianGrid,
  Tooltip, Legend, ResponsiveContainer, ReferenceLine
} = Recharts;

// ── 初期眼圧データ ──
const INIT_EYE = [
  { date:"2025-03-02", right:20, left:20, note:"エイベリス開始" },
  { date:"2025-03-22", right:17, left:18, note:"" },
  { date:"2025-04-18", right:15, left:15, note:"" },
  { date:"2025-08-22", right:14, left:15, note:"4モロール追加" },
  { date:"2025-09-22", right:15, left:18, note:"" },
  { date:"2025-10-27", right:18, left:18, note:"" },
  { date:"2025-12-26", right:15, left:16, note:"" },
  { date:"2026-01-21", right:20, left:18, note:"ドルモロール2本" },
  { date:"2026-02-19", right:15, left:17, note:"" },
  { date:"2026-04-04", right:17, left:18, note:"ドルモロール" },
  { date:"2026-05-19", right:17, left:17, note:"" },
  { date:"2026-06-17", right:17, left:17, note:"HEとール" },
];

const BASE = 21;
const TARGET = Math.round(BASE * 0.7 * 10) / 10; // 14.7

const todayStr = () => new Date().toISOString().slice(0,10);
const fmt = d => d.replace(/-/g,"/");
const pct = v => (((BASE - v) / BASE) * 100).toFixed(1);

const load = (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ── カラーパレット ──
const C = {
  bg:"#0f1923", card:"#172130", border:"#1e3048",
  accent:"#3b9eff", green:"#38c97d", yellow:"#f5c842",
  red:"#f05c5c", text:"#e4eaf2", sub:"#7a91a8",
};

// ── スタイルヘルパー ──
const css = {
  card: { background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:14, marginBottom:12 },
  label: { fontSize:12, color:C.sub, marginBottom:4, display:"block" },
  input: { width:"100%", background:"#0a1520", border:`1px solid ${C.border}`, borderRadius:6,
           color:C.text, padding:"8px 10px", fontSize:14 },
  row: { display:"flex", gap:8, marginBottom:10 },
  h2: { fontSize:13, fontWeight:700, color:C.accent, marginBottom:10 },
  btn: (col=C.accent) => ({
    background:col, color:"#fff", border:"none", borderRadius:7,
    padding:"11px 0", width:"100%", fontSize:14, fontWeight:700, cursor:"pointer"
  }),
  toggle: on => ({
    display:"inline-flex", alignItems:"center", gap:5, cursor:"pointer",
    padding:"6px 11px", borderRadius:6, fontSize:13, border:`1px solid ${on ? C.green : C.border}`,
    background: on ? "#1a3a2a" : "#1a2535", color: on ? C.green : C.sub,
  }),
  badge: ok => ({
    display:"inline-block", padding:"2px 8px", borderRadius:20, fontSize:11, fontWeight:700,
    background: ok ? "#1a3a2a" : "#3a2a10", color: ok ? C.green : C.yellow,
  }),
};

// ══════════════════════════════════════════
// 今日の記録タブ
// ══════════════════════════════════════════
function TabDaily({ dailyRecords, setDailyRecords }) {
  const [f, setF] = useState({
    date:todayStr(), weight:"", bpSys:"", bpDia:"",
    steps:"", walk:true, sleep:"", alcohol:"なし",
    tomato:false, tomatoMl:"200",
    dokudami:false, dokuCup:"1",
    greenVeg:false, fish:false, salt:false, memo:"",
  });
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  const onSave = () => {
    if (!f.date) { alert("日付を入力してください"); return; }
    setDailyRecords(p => {
      const arr = p.filter(r => r.date !== f.date);
      return [...arr, {...f}].sort((a,b) => a.date > b.date ? -1 : 1);
    });
    alert(`${fmt(f.date)} の記録を保存しました ✓`);
  };

  return (
    <div>
      {/* 基本記録 */}
      <div style={css.card}>
        <p style={css.h2}>📅 基本記録</p>
        <div style={{...css.row, marginBottom:10}}>
          <div style={{flex:1}}>
            <label style={css.label}>日付</label>
            <input type="date" style={css.input} value={f.date} onChange={e=>set("date",e.target.value)}/>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <label style={css.label}>体重 (kg)</label>
          <input type="number" step="0.1" style={css.input} placeholder="例: 68.5"
            value={f.weight} onChange={e=>set("weight",e.target.value)}/>
        </div>
        <div style={{marginBottom:10}}>
          <label style={css.label}>血圧 (mmHg)</label>
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <input type="number" style={{...css.input,width:90}} placeholder="収縮期"
              value={f.bpSys} onChange={e=>set("bpSys",e.target.value)}/>
            <span style={{color:C.sub, fontSize:16}}>/</span>
            <input type="number" style={{...css.input,width:90}} placeholder="拡張期"
              value={f.bpDia} onChange={e=>set("bpDia",e.target.value)}/>
          </div>
        </div>
        <div style={css.row}>
          <div style={{flex:1}}>
            <label style={css.label}>歩数</label>
            <input type="number" style={css.input} placeholder="例: 8500"
              value={f.steps} onChange={e=>set("steps",e.target.value)}/>
          </div>
          <div style={{flex:1}}>
            <label style={css.label}>睡眠時間 (h)</label>
            <input type="number" step="0.5" style={css.input} placeholder="例: 7.0"
              value={f.sleep} onChange={e=>set("sleep",e.target.value)}/>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <label style={css.label}>徒歩通勤</label>
          <div style={{display:"flex", gap:8}}>
            {[["あり（40分）",true],["なし（雨天等）",false]].map(([l,v])=>(
              <button key={l} style={css.toggle(f.walk===v)} onClick={()=>set("walk",v)}>{l}</button>
            ))}
          </div>
        </div>
        <div>
          <label style={css.label}>飲酒</label>
          <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
            {["なし","少量(1合未満)","1合","2合以上"].map(v=>(
              <button key={v} style={css.toggle(f.alcohol===v)} onClick={()=>set("alcohol",v)}>{v}</button>
            ))}
          </div>
        </div>
      </div>

      {/* 食生活 */}
      <div style={css.card}>
        <p style={css.h2}>🥗 食生活チェック</p>
        <div style={{marginBottom:8, display:"flex", alignItems:"center", gap:10}}>
          <button style={css.toggle(f.tomato)} onClick={()=>set("tomato",!f.tomato)}>🍅 トマトジュース</button>
          {f.tomato && (
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <input type="number" style={{...css.input,width:70}} value={f.tomatoMl}
                onChange={e=>set("tomatoMl",e.target.value)}/>
              <span style={{color:C.sub}}>ml</span>
            </div>
          )}
        </div>
        <div style={{marginBottom:8, display:"flex", alignItems:"center", gap:10}}>
          <button style={css.toggle(f.dokudami)} onClick={()=>set("dokudami",!f.dokudami)}>🍵 ドクダミ茶</button>
          {f.dokudami && (
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <input type="number" style={{...css.input,width:70}} value={f.dokuCup}
                onChange={e=>set("dokuCup",e.target.value)}/>
              <span style={{color:C.sub}}>杯</span>
            </div>
          )}
        </div>
        {[{k:"greenVeg",l:"🥦 緑黄色野菜"},{k:"fish",l:"🐟 青魚"},{k:"salt",l:"🧂 減塩を意識"}].map(({k,l})=>(
          <div key={k} style={{marginBottom:8}}>
            <button style={css.toggle(f[k])} onClick={()=>set(k,!f[k])}>{l}</button>
          </div>
        ))}
        <div style={{marginTop:10}}>
          <label style={css.label}>メモ</label>
          <textarea style={{...css.input,height:60,resize:"vertical"}}
            placeholder="体調・気になること"
            value={f.memo} onChange={e=>set("memo",e.target.value)}/>
        </div>
      </div>
      <button style={css.btn(C.green)} onClick={onSave}>💾 記録を保存</button>
    </div>
  );
}

// ══════════════════════════════════════════
// 眼圧記録タブ
// ══════════════════════════════════════════
function TabEye({ eyeRecords, setEyeRecords }) {
  const [f, setF] = useState({ date:todayStr(), right:"", left:"", note:"" });
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  const onSave = () => {
    if (!f.right || !f.left) { alert("右眼・左眼を入力してください"); return; }
    const rec = { ...f, right:Number(f.right), left:Number(f.left) };
    setEyeRecords(p => {
      const arr = p.filter(r => r.date !== rec.date);
      return [...arr, rec].sort((a,b)=>a.date>b.date?1:-1);
    });
    setF({ date:todayStr(), right:"", left:"", note:"" });
    alert(`眼圧を記録しました（右${rec.right} / 左${rec.left}）`);
  };

  return (
    <div>
      <div style={css.card}>
        <p style={css.h2}>👁 通院記録を追加</p>
        <div style={{marginBottom:10}}>
          <label style={css.label}>日付</label>
          <input type="date" style={css.input} value={f.date} onChange={e=>set("date",e.target.value)}/>
        </div>
        <div style={css.row}>
          <div style={{flex:1}}>
            <label style={css.label}>右眼 (mmHg)</label>
            <input type="number" style={css.input} value={f.right} onChange={e=>set("right",e.target.value)}/>
          </div>
          <div style={{flex:1}}>
            <label style={css.label}>左眼 (mmHg)</label>
            <input type="number" style={css.input} value={f.left} onChange={e=>set("left",e.target.value)}/>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={css.label}>備考（点眼薬変更など）</label>
          <input type="text" style={css.input} value={f.note} onChange={e=>set("note",e.target.value)}/>
        </div>
        <button style={css.btn()} onClick={onSave}>👁 眼圧を記録</button>
      </div>

      <div style={css.card}>
        <p style={css.h2}>📋 眼圧履歴　目標: {TARGET} mmHg 以下（30%下降）</p>
        {[...eyeRecords].reverse().map((r,i)=>{
          const rOk = r.right <= TARGET, lOk = r.left <= TARGET;
          return (
            <div key={i} style={{borderBottom:`1px solid ${C.border}`, paddingBottom:8, marginBottom:8}}>
              <div style={{display:"flex", justifyContent:"space-between"}}>
                <b>{fmt(r.date)}</b>
                {r.note && <span style={{fontSize:11,color:C.sub}}>{r.note}</span>}
              </div>
              <div style={{display:"flex", gap:14, marginTop:5, flexWrap:"wrap"}}>
                <span>右: <b style={{color: rOk?C.green:C.yellow}}>{r.right}</b>
                  <span style={{fontSize:11,color:C.sub}}> ({pct(r.right)}%↓) </span>
                  <span style={css.badge(rOk)}>{rOk?"✓達成":"未達"}</span>
                </span>
                <span>左: <b style={{color: lOk?C.green:C.yellow}}>{r.left}</b>
                  <span style={{fontSize:11,color:C.sub}}> ({pct(r.left)}%↓) </span>
                  <span style={css.badge(lOk)}>{lOk?"✓達成":"未達"}</span>
                </span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
// グラフタブ
// ══════════════════════════════════════════
function TabChart({ eyeRecords, dailyRecords }) {
  const eyeData = eyeRecords.map(r=>({
    date: fmt(r.date).slice(5), 右眼:r.right, 左眼:r.left
  }));
  const wtData = dailyRecords.filter(r=>r.weight).map(r=>({
    date: fmt(r.date).slice(5), 体重:Number(r.weight)
  }));
  const bpData = dailyRecords.filter(r=>r.bpSys).map(r=>({
    date: fmt(r.date).slice(5), 収縮期:Number(r.bpSys), 拡張期:Number(r.bpDia)
  }));

  const ttStyle = { background:C.card, border:`1px solid ${C.border}`, color:C.text, fontSize:12 };
  const ax = { fill:C.sub, fontSize:10 };

  return (
    <div>
      {/* 眼圧グラフ */}
      <div style={css.card}>
        <p style={css.h2}>👁 眼圧推移（目標 {TARGET} mmHg）</p>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={eyeData} margin={{top:5,right:10,left:-20,bottom:5}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="date" tick={ax}/>
            <YAxis domain={[10,25]} tick={ax}/>
            <Tooltip contentStyle={ttStyle}/>
            <Legend wrapperStyle={{fontSize:12}}/>
            <ReferenceLine y={TARGET} stroke={C.green} strokeDasharray="5 5"
              label={{value:`目標 ${TARGET}`, fill:C.green, fontSize:10, position:"insideTopRight"}}/>
            <Line type="monotone" dataKey="右眼" stroke={C.accent} strokeWidth={2} dot={{r:4}}/>
            <Line type="monotone" dataKey="左眼" stroke={C.yellow} strokeWidth={2} dot={{r:4}}/>
          </LineChart>
        </ResponsiveContainer>
      </div>

      {/* 体重グラフ */}
      {wtData.length > 0 ? (
        <div style={css.card}>
          <p style={css.h2}>⚖️ 体重推移 (kg)</p>
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={wtData} margin={{top:5,right:10,left:-20,bottom:5}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="date" tick={ax}/>
              <YAxis tick={ax}/>
              <Tooltip contentStyle={ttStyle}/>
              <Line type="monotone" dataKey="体重" stroke={C.green} strokeWidth={2} dot={{r:3}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      ) : (
        <div style={{...css.card, textAlign:"center", color:C.sub, padding:20, fontSize:12}}>
          体重を記録するとグラフが表示されます
        </div>
      )}

      {/* 血圧グラフ */}
      {bpData.length > 0 ? (
        <div style={css.card}>
          <p style={css.h2}>💉 血圧推移 (mmHg)</p>
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={bpData} margin={{top:5,right:10,left:-20,bottom:5}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="date" tick={ax}/>
              <YAxis tick={ax}/>
              <Tooltip contentStyle={ttStyle}/>
              <Legend wrapperStyle={{fontSize:12}}/>
              <ReferenceLine y={120} stroke={C.yellow} strokeDasharray="3 3"/>
              <Line type="monotone" dataKey="収縮期" stroke={C.red} strokeWidth={2} dot={{r:3}}/>
              <Line type="monotone" dataKey="拡張期" stroke={C.accent} strokeWidth={2} dot={{r:3}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      ) : (
        <div style={{...css.card, textAlign:"center", color:C.sub, padding:20, fontSize:12}}>
          血圧を記録するとグラフが表示されます
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════
// 履歴タブ
// ══════════════════════════════════════════
function TabHistory({ dailyRecords }) {
  if (dailyRecords.length === 0) return (
    <div style={{...css.card, textAlign:"center", color:C.sub, padding:30}}>
      まだ記録がありません
    </div>
  );

  return (
    <div>
      {dailyRecords.map((r,i)=>{
        const food = [r.tomato,r.dokudami,r.greenVeg,r.fish,r.salt].filter(Boolean).length;
        return (
          <div key={i} style={css.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <b style={{fontSize:15}}>{fmt(r.date)}</b>
              <span style={{fontSize:11,color:C.sub}}>食事スコア {food}/5</span>
            </div>
            <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
              {r.weight  && <span style={css.badge(true)}>⚖️ {r.weight}kg</span>}
              {r.bpSys   && <span style={css.badge(Number(r.bpSys)<130)}>💉 {r.bpSys}/{r.bpDia}</span>}
              {r.steps   && <span style={css.badge(Number(r.steps)>=6000)}>🚶 {Number(r.steps).toLocaleString()}歩</span>}
              {r.sleep   && <span style={css.badge(Number(r.sleep)>=6)}>😴 {r.sleep}h</span>}
              {r.walk    && <span style={css.badge(true)}>🏃 徒歩通勤</span>}
              {r.tomato  && <span style={css.badge(true)}>🍅 {r.tomatoMl}ml</span>}
              {r.dokudami && <span style={css.badge(true)}>🍵 {r.dokuCup}杯</span>}
              {r.greenVeg && <span style={css.badge(true)}>🥦</span>}
              {r.fish    && <span style={css.badge(true)}>🐟</span>}
              {r.salt    && <span style={css.badge(true)}>🧂 減塩</span>}
              {r.alcohol && r.alcohol!=="なし" && <span style={css.badge(false)}>🍺 {r.alcohol}</span>}
            </div>
            {r.memo && <p style={{marginTop:7,fontSize:12,color:C.sub}}>{r.memo}</p>}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════
// メインアプリ
// ══════════════════════════════════════════
function App() {
  const [tab, setTab] = useState(0);
  const [eyeRecords, setEyeRecords]     = useState(()=>load("gr_eye", INIT_EYE));
  const [dailyRecords, setDailyRecords] = useState(()=>load("gr_daily", []));

  useEffect(()=>save("gr_eye",   eyeRecords),   [eyeRecords]);
  useEffect(()=>save("gr_daily", dailyRecords), [dailyRecords]);

  const TABS = ["今日の記録","眼圧記録","グラフ","履歴"];

  const tabBtnStyle = active => ({
    flex:1, padding:"11px 2px", textAlign:"center", fontSize:12,
    cursor:"pointer", border:"none", background:"transparent",
    color: active ? C.accent : C.sub,
    borderBottom: active ? `2px solid ${C.accent}` : "2px solid transparent",
    fontWeight: active ? 700 : 400,
  });

  const panels = [
    <TabDaily    dailyRecords={dailyRecords} setDailyRecords={setDailyRecords}/>,
    <TabEye      eyeRecords={eyeRecords}     setEyeRecords={setEyeRecords}/>,
    <TabChart    eyeRecords={eyeRecords}     dailyRecords={dailyRecords}/>,
    <TabHistory  dailyRecords={dailyRecords}/>,
  ];

  return (
    <div style={{minHeight:"100vh", background:C.bg}}>
      {/* ヘッダー */}
      <div style={{background:C.card, borderBottom:`1px solid ${C.border}`, padding:"12px 16px"}}>
        <p style={{fontSize:16, fontWeight:700, color:C.accent}}>👁 緑内障・生活習慣 記録帳</p>
        <p style={{fontSize:11, color:C.sub, marginTop:2}}>
          目標眼圧 {TARGET} mmHg（基準値 {BASE} から 30% 下降）
        </p>
      </div>

      {/* タブバー */}
      <div style={{display:"flex", background:C.card, borderBottom:`1px solid ${C.border}`}}>
        {TABS.map((t,i)=>(
          <button key={i} style={tabBtnStyle(tab===i)} onClick={()=>setTab(i)}>{t}</button>
        ))}
      </div>

      {/* コンテンツ */}
      <div style={{padding:"12px 14px", maxWidth:640, margin:"0 auto"}}>
        {panels[tab]}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
